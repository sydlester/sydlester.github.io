# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  #check to see if the resume was update and needs to be rebuilt
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      file_changed: ${{ steps.check.outputs.file_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 #prior 2 commits are needed to check for changes
      - name: Check for file changes
        id: check
        run: |
          git fetch origin ${{ github.base_ref }}
          changed_files=$(git diff --name-only HEAD^ HEAD)
          if echo "${changed_files}" | grep -q "resume/"; then
            echo "file_changed=true" >> $GITHUB_OUTPUT
          else
            echo "file_changed=false" >> $GITHUB_OUTPUT
          fi
  
  #compile the resume if needed
  build_latex:
    needs: check_changes
    if: needs.check_changes.outputs.file_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
        # Give the default GITHUB_TOKEN write permission to commit and push the changed files back to the repository.
        contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume/resume.tex
          work_in_root_file_dir: true

      - name: Rename file
        run: mv resume/resume.pdf public/Sydney-Lester-Resume.pdf

      - name: Commit and push
        run: |
          git config --local user.name "GitHub Action [bot]"
          git add '**/*.pdf'
          git commit -m "Build resume"
          git push        

  # build static content for gh pages
  deploy:
    # ensure that the resume is built first, if required
    needs: [check_changes, build_latex]
    if: needs.build_latex.result == 'success' || needs.build_latex.result == 'skipped'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build    

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
